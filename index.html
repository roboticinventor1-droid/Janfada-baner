*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'BTitrEmbedded',Tahoma,Arial,sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* ==========================
   صفحه تنظیمات
========================== */

#inputPage{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    overflow:auto;
}

.panel{
    width:min(900px,95%);
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:25px;
    padding:30px;
    padding-top:70px;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.title{
    text-align:center;
    font-size:28px;
    margin-top:40px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:.8;
    margin-bottom:25px;
}

#userText{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    font-size:24px;
    text-align:center;
    margin-bottom:25px;
    outline:none;
}

.section-title{
    text-align:center;
    margin:18px 0 10px;
    font-size:22px;
}

.slider{
    width:100%;
    height:14px;
    appearance:none;
    -webkit-appearance:none;
    background:#334155;
    border-radius:20px;
}

.slider::-webkit-slider-thumb{
    appearance:none;
    -webkit-appearance:none;
    width:30px;
    height:30px;
    border-radius:50%;
    background:#facc15;
    border:3px solid white;
    cursor:pointer;
}

.slider::-moz-range-thumb{
    width:30px;
    height:30px;
    border-radius:50%;
    background:#facc15;
    border:3px solid white;
    cursor:pointer;
}

.value-label{
    text-align:center;
    margin-top:10px;
    font-size:20px;
    font-weight:bold;
}

/* رنگ */

.color-picker{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
}

.color{
    width:50px;
    height:50px;
    border-radius:50%;
    cursor:pointer;
    border:4px solid transparent;
    transition:.2s;
}

.color:hover{
    transform:scale(1.15);
}

.color.active{
    border-color:white;
    box-shadow:0 0 15px white;
}

/* پیش نمایش */

#preview{
    height:70px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:36px;
    font-weight:bold;
    margin-top:10px;
}

.startBtn{
    width:100%;
    padding:18px;
    margin-top:25px;
    border:none;
    border-radius:15px;
    font-size:28px;
    font-weight:bold;
    background:#facc15;
    color:black;
    cursor:pointer;
}

/* ==========================
   صفحه بنر
========================== */

#bannerPage{
    display:none;
    width:100%;
    height:100vh;
    background:black;
    position:relative;
    overflow:hidden;
    align-items:center;
}

.backBtn{
    position:absolute;
    top:15px;
    left:15px;
    z-index:999;
    border:none;
    border-radius:10px;
    padding:10px 20px;
    cursor:pointer;
    background:white;
}

#bannerText{
    position:absolute;
    white-space:nowrap;
    font-weight:900;
    top:55%;
    transform:translateY(-50%);
    letter-spacing:3px;
}

<!-- تنظیمات -->

<div id="inputPage">

    <div class="panel">

        <div class="title">📢 بنر متحرک جانفدایان عشایر لرستان</div>

        <div class="subtitle">
            متن، رنگ و سرعت را تنظیم کنید
        </div>

        <input
            type="text"
            id="userText"

            oninput="updatePreview()"
        >

        <!-- سرعت -->

        <div class="section-title">
            سرعت حرکت
        </div>

        <input
            class="slider"
            type="range"
            id="speed"
            min="1"
            max="5"
            value="3"
            oninput="updateSpeedLabel()"
        >

        <div id="speedLabel" class="value-label">
            🚶 متوسط
        </div>

        <!-- رنگ -->

        <div class="section-title">
            رنگ متن
        </div>

        <div class="color-picker">

            <div class="color active"
                style="background:#ffff00"
                data-color="#ffff00"
                onclick="selectColor(this)"></div>

            <div class="color"
                style="background:#ffffff"
                data-color="#ffffff"
                onclick="selectColor(this)"></div>

            <div class="color"
                style="background:#00ff00"
                data-color="#00ff00"
                onclick="selectColor(this)"></div>

            <div class="color"
                style="background:#00ffff"
                data-color="#00ffff"
                onclick="selectColor(this)"></div>

            <div class="color"
                style="background:#ff00ff"
                data-color="#ff00ff"
                onclick="selectColor(this)"></div>

            <div class="color"
                style="background:#ff4444"
                data-color="#ff4444"
                onclick="selectColor(this)"></div>

        </div>

        <!-- پیش نمایش -->

        <div class="section-title">
            پیش نمایش
        </div>

        <div id="preview">
            متن نمونه
        </div>
        <div id="sentenceMemoryPanel" style="margin-top:20px;background:#fff;padding:10px;border:1px solid #ccc;border-radius:8px;max-width:420px">
<select id="sentenceSelect" style="width:100%;margin-bottom:6px"></select>
<input id="newSentence" type="text" placeholder="جمله جدید" style="width:100%;margin-bottom:6px">
<button onclick="saveNewSentence()">ذخیره جمله</button>
</div>

        <button
            class="startBtn"
            onclick="startBanner()">
            نمایش بنر
        </button>

    </div>

</div>

<!-- بنر -->

<div id="bannerPage">

    <button
        class="backBtn"
        onclick="goBack()">
        بازگشت
    </button>

    <div id="bannerText"></div>

</div>

<script>

let selectedColor = "#ffff00";
let animationId = null;

/* ---------- سرعت ---------- */

function updateSpeedLabel(){

    const speed =
        Number(document.getElementById("speed").value);

    let text = "🚶 متوسط";

    if(speed===1) text="🐌 خیلی کند";
    if(speed===2) text="🐢 کند";
    if(speed===3) text="🚶 متوسط";
    if(speed===4) text="🚀 سریع";
    if(speed===5) text="⚡ خیلی سریع";

    document.getElementById("speedLabel").innerText =
        text;
}

/* ---------- رنگ ---------- */

function selectColor(el){

    document
        .querySelectorAll(".color")
        .forEach(c => c.classList.remove("active"));

    el.classList.add("active");

    selectedColor = el.dataset.color;

    updatePreview();
}

/* ---------- پیش نمایش ---------- */

function updatePreview(){

    const preview =
        document.getElementById("preview");

    let txt =
        document.getElementById("userText").value;

    

    if(txt.length > 20){
        txt = txt.substring(0,20) + " ...";
    }

    preview.innerText =
        txt || "متن نمونه";

    preview.style.color =
        selectedColor;

    preview.style.textShadow='none';

    
}

/* ---------- نمایش بنر ---------- */

function startBanner(){

    const text =
        document.getElementById("userText")
        .value.trim();

    if(!text){
        alert("لطفاً متن را وارد کنید");
        return;
    }

    const elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    }

    document.getElementById("inputPage")
        .style.display="none";

    document.getElementById("bannerPage")
        .style.display="flex";

    const banner =
        document.getElementById("bannerText");

    

    banner.innerText = text;

    banner.style.fontSize = "80vh";

    banner.style.color =
        selectedColor;

    banner.style.textShadow='none';

    setTimeout(()=>{

        const textWidth =
            banner.offsetWidth;

        const level =
            Number(document.getElementById("speed").value);

        let pixelsPerFrame;

        // چپ = کند ، راست = سریع
        switch(level){
            case 1: pixelsPerFrame = 5; break;
            case 2: pixelsPerFrame = 10; break;
            case 3: pixelsPerFrame = 15; break;
            case 4: pixelsPerFrame = 20; break;
            case 5: pixelsPerFrame = 25; break;
        }

        let x = -textWidth;

        cancelAnimationFrame(animationId);

        function animate(){

            x += pixelsPerFrame;

            if(x > window.innerWidth){
                x = -textWidth;
            }

            banner.style.left =
                x + "px";

            animationId =
                requestAnimationFrame(animate);
        }

        animate();

    },100);
}

/* ---------- بازگشت ---------- */

function goBack(){
    if (document.fullscreenElement) {
        document.exitFullscreen();
    } else if (document.webkitFullscreenElement) {
        document.webkitExitFullscreen();
    }

    cancelAnimationFrame(animationId);

    document.getElementById("bannerPage")
        .style.display="none";

    document.getElementById("inputPage")
        .style.display="flex";
}

updatePreview();
updateSpeedLabel();

</script>


<script>
let defaultSentences=[
"نه اصلاح طلب نه اصولگرا ، ما علی الاصول گرا هستیم",
"علی الاصول ما با آمریکا پدرکشتگی داریم",
"علی الاصول مسیر حسین و شمر جداست",
"قاتل امام خامنه‌ای جان سالم ببرد نامردیم",
"فرزندان خمینی آمریکا را پنچر کردند",
"فرزندان خامنه‌ای آمریکا را زیر پا له کردند",
"مردم پوزه‌ی آمریکا را به خاک مالیدند",
"آمریکا باید بی قید و شرط تسلیم شود و زانو بزند",
"آماده‌ی نبرد بی‌انتها با آمریکا هستیم"
];

let saved=JSON.parse(localStorage.getItem('sentences')||'null');
if(!saved){
  saved=[...defaultSentences];
  localStorage.setItem('sentences',JSON.stringify(saved));
}

function getSentences(){
  return JSON.parse(localStorage.getItem('sentences')||'[]');
}

function addSentence(text){
  if(!text || !text.trim()) return;
  let arr=getSentences();
  arr.push(text.trim());
  localStorage.setItem('sentences',JSON.stringify(arr));
}
</script>



<script>
function refreshSentenceSelect(){
  const sel=document.getElementById('sentenceSelect');
  if(!sel) return;
  sel.innerHTML='';
  getSentences().forEach(function(t,i){
    let op=document.createElement('option');
    op.value=i;
    op.textContent=t;
    sel.appendChild(op);
  });
}


function applySelectedSentence(){
  const sel=document.getElementById('sentenceSelect');
  const userText=document.getElementById('userText');
  const banner=document.getElementById('bannerText');
  if(!sel) return;
  const sentence = sel.options.length ? sel.options[sel.selectedIndex].text : '';
  if(userText) userText.value = sentence;
  if(typeof updatePreview==='function') updatePreview();
  if(banner) banner.innerText = sentence;
}

function saveNewSentence(){
  const inp=document.getElementById('newSentence');
  if(!inp.value.trim()) return;
  addSentence(inp.value.trim());
  inp.value='';
  refreshSentenceSelect();
  const sel=document.getElementById('sentenceSelect');
  if(sel){ sel.selectedIndex=sel.options.length-1; applySelectedSentence(); }
}

document.addEventListener('DOMContentLoaded',function(){ refreshSentenceSelect(); const sel=document.getElementById('sentenceSelect'); if(sel){ sel.addEventListener('change',applySelectedSentence); applySelectedSentence(); }});
</script>


<script>

  const panel=document.getElementById('sentencePanel') ||
              document.querySelector('.sentence-panel') ||
              document.querySelector('#sentencesBox');

  const showBtn=[...document.querySelectorAll('button,input[type=button]')]
      .find(e=>/نمایش.*بنر|بنر/.test((e.innerText||e.value||'')));

  if(showBtn && panel){
    showBtn.addEventListener('click',()=>{ panel.style.display='none'; });
  }

  const sel=document.getElementById('sentenceSelect');
  if(sel && !document.getElementById('editSentenceBtn')){
    const editBtn=document.createElement('button');
    editBtn.id='editSentenceBtn';
    editBtn.textContent='ویرایش جمله';

    const delBtn=document.createElement('button');
    delBtn.id='deleteSentenceBtn';
    delBtn.textContent='حذف جمله';

    sel.parentNode.appendChild(editBtn);
    sel.parentNode.appendChild(delBtn);

    editBtn.onclick=()=>{
      if(sel.selectedIndex<0) return;
      const current=sel.options[sel.selectedIndex].text;
      const updated=prompt('ویرایش جمله', current);
      if(updated && updated.trim()){
        sel.options[sel.selectedIndex].text=updated.trim();
        sel.options[sel.selectedIndex].value=updated.trim();
        if(typeof applySelectedSentence==='function') applySelectedSentence();
      }
    };

    delBtn.onclick=()=>{
      if(sel.selectedIndex<0) return;
      if(confirm('این جمله حذف شود؟')){
        sel.remove(sel.selectedIndex);
        if(sel.options.length>0) sel.selectedIndex=0;
        if(typeof applySelectedSentence==='function') applySelectedSentence();
      }
    };
  }
});
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
